<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Tag Game</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header id="hud">
        <span id="score">Score: 0</span>
        <span id="timer">Time: 1:00</span>
        <span id="status">Tap to Start</span>
      </header>
      <canvas id="game-canvas"></canvas>
      <div id="overlay" class="visible">
        <div id="overlay-content">
          <h1>Tag Game</h1>
          <p>Tap to move or use WASD. Avoid the red player when they're It - or chase bots when you're It!</p>
          <button id="start-btn">Tap to Start</button>
        </div>
      </div>
      <div id="flash" class="hidden">TAGGED!</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
